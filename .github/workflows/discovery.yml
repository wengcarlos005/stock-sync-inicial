name: Discovery — Parear ML ↔ Shopee

on:
  # Roda todo dia às 6h BRT (= 9h UTC)
  schedule:
    - cron: '0 9 * * *'
  # Ou dispara manualmente pelo GitHub (Actions → Run workflow)
  workflow_dispatch:
    inputs:
      debug:
        description: 'Modo debug (dumpa estrutura crua dos primeiros 3 itens)'
        type: boolean
        default: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar discovery
        env:
          MAC_API_KEY:   ${{ secrets.MAC_API_KEY }}
          MAC_URL:       ${{ secrets.MAC_URL }}
          MELI_USER_ID:  ${{ secrets.MELI_USER_ID }}
          WORKER_URL:    ${{ secrets.WORKER_URL }}
          ADMIN_TOKEN:   ${{ secrets.ADMIN_TOKEN }}
          DEBUG:         ${{ inputs.debug && '1' || '' }}
        run: node discover-local.js
